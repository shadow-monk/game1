<style>
/* <![CDATA[ */
/* アニメーション */
@keyframes floatP { 0% { transform: translateY(0px) scaleY(1); } 100% { transform: translateY(-15px) scaleY(1.03) scaleX(0.98); } }
@keyframes floatE { 0% { transform: translateY(0px) scale(1); } 100% { transform: translateY(-10px) scale(1.03); } }
@keyframes pulse { 0% { transform: scale(1); opacity: 0.9; } 100% { transform: scale(1.05); opacity: 1; } }
@keyframes txtAlert { 0% { opacity: 0.3; } 100% { opacity: 1; } }

/* 瀕死時警報 */
@keyframes crisisAlert {
  0% { box-shadow: inset 0 0 10px rgba(239,68,68,0); }
  50% { box-shadow: inset 0 0 35px rgba(239,68,68,0.8); }
  100% { box-shadow: inset 0 0 10px rgba(239,68,68,0); }
}

/* 敵の残像突進 */
@keyframes enemyAssault {
  0% { transform: translateX(0); }
  20% { transform: translateX(30px); filter: drop-shadow(-20px 0 0 rgba(244,63,94,0.4)); }
  45% { transform: translateX(-150px) scale(1.1); filter: drop-shadow(30px 0 4px rgba(244,63,94,0.6)); }
  70% { transform: translateX(15px); }
  100% { transform: translateX(0); }
}

/* 魔法軌道 */
@keyframes fireFly { 0% { transform: translate(-140px,40px) scale(0.4); opacity:0; } 15% { opacity:1; } 100% { transform: translate(110px,-20px) rotate(540deg) scale(1.3); opacity:0; } }
@keyframes iceFly { 0% { transform: translate(-140px,20px) scaleX(0.3); opacity:0; } 10% { opacity:1; } 100% { transform: translate(110px,-15px) scaleX(1.4); opacity:0; } }
@keyframes holyFly { 0% { transform: translate(-140px,20px) scale(0.3); opacity:0; } 30% { transform: translate(-30px,-120px) scale(1); opacity:1; } 100% { transform: translate(110px,-40px) scale(0.5); opacity:0; } }

/* 炸裂演出 */
@keyframes fireBoomBlock { 0% { transform: scale(0); opacity:0; } 50% { transform: scale(1.4); opacity:1; } 100% { transform: scale(1); opacity:1; } }
@keyframes iceSpike { 0% { transform: scaleY(0) translateY(80px); opacity:0; } 30% { transform: scaleY(1.3) translateY(-15px); opacity:1; } 100% { transform: scaleY(1) translateY(0px); opacity:1; } }
@keyframes holyDown { 0% { transform: translateY(-220px) scaleX(0.5); opacity:0; } 40% { transform: translateY(0px) scaleX(1.4); opacity:1; } 100% { transform: translateY(10px) scaleX(1); opacity:1; } }
@keyframes pulseBoom { 0% { transform: translate(0,0) scale(1); opacity:1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0.1); opacity:0; } }
/* ]]> */
</style>
</head>

<script>
/* <![CDATA[ */
// 🔧 ② 修正：スライム画像を(1)〜(6)の全6パターンへ完全配列化
const SLIME_FRAMES = [
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(1).png",
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(2).png",
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(3).png",
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(4).png",
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(5).png",
  "https://raw.githubusercontent.com/shadow-monk/game1/main/assets/imagesX/Slime%20(6).png"
];
const MASTER_SHEET_URL = "https://raw.githubusercontent.com/shadow-monk/game1/main/SPY01.jpg";

const MISSILE_EFFECTS = {
  fire: `<div style="position:absolute; top:50%; left:50%; width:120px; height:120px; margin-top:-60px; margin-left:-60px; z-index:10; pointer-events:none; animation: fireFly 0.42s cubic-bezier(0.25, 1, 0.5, 1) forwards;"><svg viewBox="0 0 100 100"><path d="M30 50h40v10H30zm10-20h20v10H40zm-20 30h60v10H20zm10 10h40v10H30zm10 10h20v5H40z" fill="#f97316"/><path d="M40 40h20v10H40zm-10 10h40v10H30zm10 10h20v10H40z" fill="#facc15"/></svg></div>`,
  ice: `<div style="position:absolute; top:50%; left:50%; width:130px; height:60px; margin-top:-30px; margin-left:-65px; z-index:10; pointer-events:none; animation: iceFly 0.36s linear forwards;"><svg viewBox="0 0 80 40"><path d="M0 15h50v10H0zm30-10h30v5H30z" fill="#38bdf8"/><path d="M20 18h40v4H20z" fill="#e0f2fe"/></svg></div>`,
  holy: `<div style="position:absolute; top:50%; left:50%; width:90px; height:90px; margin-top:-45px; margin-left:-45px; z-index:10; pointer-events:none; animation: holyFly 0.45s ease-in-out forwards;"><svg viewBox="0 0 60 60"><path d="M25 5h10v50H25zm-20 20h50v10H5zm5-5h40v1h-40z" fill="#facc15"/></svg></div>`
};

const HIT_LAND_EFFECTS = {
  fire: `<div style="position:absolute; width:140px; height:140px; top:50%; left:50%; margin-top:-70px; margin-left:-70px; animation: fireBoomBlock 0.25s ease-out forwards; z-index:11;"><svg viewBox="0 0 100 100" width="100%" height="100%"><circle cx="50" cy="50" r="40" fill="#ef4444" opacity="0.85"/><circle cx="50" cy="50" r="26" fill="#f97316"/><circle cx="50" cy="50" r="13" fill="#ffffff"/></svg></div>`,
  ice: `<div style="position:absolute; width:160px; height:160px; top:50%; left:50%; margin-top:-95px; margin-left:-80px; animation: iceSpike 0.32s ease-out forwards; transform-origin: bottom center; z-index:11;"><svg viewBox="0 0 100 100" width="100%" height="100%"><path d="M50 10l10 25h-20zm-25 40l25-10v20z" fill="#38bdf8"/><path d="M50 25l5 15h-10z" fill="#e0f2fe"/></svg></div>`,
  holy: `<div style="position:absolute; width:100px; height:280px; top:50%; left:50%; margin-top:-220px; margin-left:-50px; animation: holyDown 0.35s ease-in forwards; z-index:11;"><svg viewBox="0 0 40 120" width="100%" height="100%"><path d="M18 0h4v80h-4z" fill="#facc15"/><path d="M19 10h2v60h-2z" fill="#ffffff"/></svg></div>`
};

const STAGES = [
  { floor: 1,  name: "グリーンスライム", hp: 65,  atk: 10, weak: "fire", isCustom: true,  eMod: "rgba(34,197,94,0.4)",  txt: "1階。通路を塞ぐ酸性の巨大6枚ドット絵スライム！熱に弱く【炎(ファイア)】の術式が特効爆発する！" },
  { floor: 2,  name: "スカイバット",     hp: 80,  atk: 13, weak: "ice",  isCustom: false, eMod: "rgba(148,163,184,0.4)", txt: "2階。螺旋の塔の通路に巣食う吸血コウモリ。冷気に弱く【氷(アイス)】の術式が有効だ！", bgX: "0%",   bgY: "0%" },
  { floor: 3,  name: "スケルトン武者",   hp: 120, atk: 16, weak: "holy", isCustom: false, eMod: "rgba(241,245,149,0.4)", txt: "3階。古剣を携えて迫り来る不死の骸骨兵。邪悪な魔物には【聖(ホーリー)】の光槍が刺さる！", bgX: "25%",  bgY: "0%" },
  { floor: 4,  name: "ハーピィ怪鳥",     hp: 160, atk: 20, weak: "ice",  isCustom: false, eMod: "rgba(236,72,153,0.4)",  txt: "4階。鋭い爪を持つ半人半鳥の怪鳥。羽をフリーズさせる【氷(アイス)】の術式が大きな弱点だ！", bgX: "50%",  bgY: "0%" },
  { floor: 5,  name: "ミノタウロス",     hp: 240, atk: 25, weak: "fire", isCustom: false, eMod: "rgba(239,68,68,0.5)",   txt: "5階。侵入者を切り刻む迷宮の牛頭鬼。分厚い毛皮は【炎(ファイア)】の猛火で一網打尽に燃え上がる！", bgX: "75%",  bgY: "0%" },
  { floor: 6,  name: "マッドクモ",       hp: 210, atk: 22, weak: "fire", isCustom: false, eMod: "rgba(168,85,247,0.4)",  txt: "6階。天井から急降下してくる大蜘蛛。巣ごと焼き払える【炎(ファイア)】の術式が効果力！", bgX: "100%", bgY: "0%" },
  { floor: 7,  name: "ゾンビソルジャー", hp: 280, atk: 26, weak: "holy", isCustom: false, eMod: "rgba(22,163,74,0.5)",   txt: "7階。いくら肉体を切り刻まれようとも立ち上がる。聖なる【聖(ホーリー)】の力で浄化せよ！", bgX: "0%",   bgY: "100%" },
  { floor: 8,  name: "アイアンゴーレム", hp: 320, atk: 32, weak: "ice",  isCustom: false, eMod: "rgba(100,116,139,0.5)", txt: "8階。肉塊をつなぎ合わされた禁忌の怪物。接合部を凍らせ脆くする【氷(アイス)】が弱点だ！", bgX: "25%",  bgY: "100%" },
  { floor: 9,  name: "イビル魔眼",       hp: 390, atk: 38, weak: "holy", isCustom: false, eMod: "rgba(219,39,119,0.5)",  txt: "9階。空間に浮かぶ巨大な単眼の魔物。邪悪な魔眼の視界をまばゆい【聖(ホーリー)】の光で遮れ！", bgX: "50%",  bgY: "100%" },
  { floor: 10, name: "竜王バハムート",   hp: 550, atk: 52, weak: "holy", isCustom: false, eMod: "rgba(0,0,0,1)",         txt: "10階。螺旋の頂上に君臨する最終暗黒竜王。賢者の集大成たる【聖(ホーリー)】の神光を叩き込め！", bgX: "75%",  bgY: "100%" }
];

let animeTimer = null; let currentFrameIdx = 0; let animeSpeed = 220; let isBursting = false;

function startSlimeAnimation() {
    stopSlimeAnimation(); if (isBursting) return;
    const graphicEl = document.getElementById("e-sprite-graphic"); if (!graphicEl) return;
    
    // 🔧 ① 修正：background-sizeを100% 100%にして、不気味な回り込み画像を完璧に封鎖消去
    graphicEl.style.setProperty('background-image', `url('${SLIME_FRAMES[0]}')`, 'important');
    graphicEl.style.setProperty('background-size', '100% 100%', 'important');
    graphicEl.style.setProperty('background-repeat', 'no-repeat', 'important');
    graphicEl.style.setProperty('background-position', 'center', 'important');

    animeTimer = setInterval(() => {
        if(STAGES[curIdx] && STAGES[curIdx].isCustom && !isBursting) {
            currentFrameIdx = (currentFrameIdx + 1) % SLIME_FRAMES.length;
            graphicEl.style.setProperty('background-image', `url('${SLIME_FRAMES[currentFrameIdx]}')`, 'important');
        }
    }, animeSpeed);
}

function stopSlimeAnimation() { if(animeTimer) { clearInterval(animeTimer); animeTimer = null; } }

function burstSlimeAnimation() {
    if(STAGES[curIdx] && STAGES[curIdx].isCustom) {
        stopSlimeAnimation(); isBursting = true; let bFrame = 0;
        const graphicEl = document.getElementById("e-sprite-graphic");
        const burstTimer = setInterval(() => {
            bFrame = (bFrame + 1) % SLIME_FRAMES.length;
            if (graphicEl) graphicEl.style.setProperty('background-image', `url('${SLIME_FRAMES[bFrame]}')`, 'important');
        }, 60);
        setTimeout(() => { clearInterval(burstTimer); isBursting = false; if(document.getElementById("scr-battle").style.display === "block") startSlimeAnimation(); }, 450);
    }
}

// --- 🎧 音響 ---
let audioCtx = null; let bgmTimer = null; let bgmStep = 0; let currentBgmType = "title";
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playBgmNode() {
  if (isMuted || currentBgmType === "title") return;
  try {
    initAudio(); let now = audioCtx.currentTime;
    let osc1 = audioCtx.createOscillator(); let gainNode = audioCtx.createGain();
    osc1.connect(gainNode); gainNode.connect(audioCtx.destination);
    let baseNote = currentBgmType === "castle" ? SCALE.castle[bgmStep % 8] : SCALE.horror[bgmStep % 8];
    osc1.type = "triangle"; osc1.frequency.setValueAtTime(baseNote, now);
    gainNode.gain.setValueAtTime(0.02, now); gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    osc1.start(now); osc1.stop(now + 0.3); bgmStep++;
  } catch(e){}
}
function startBGM(type) { stopBGM(); currentBgmType = type; if (type === "title" || isMuted) return; initAudio(); bgmStep = 0; bgmTimer = setInterval(playBgmNode, currentBgmType === "castle" ? 300 : 180); }
function stopBGM() { if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; } }
function toggleMute() { isMuted = !isMuted; document.getElementById('btn-mute').innerText = isMuted ? "🔇 音声: OFF" : "🔊 音声: ON"; if (isMuted) stopBGM(); else startBGM(currentBgmType); }

function playSE(type) {
  if (isMuted) return;
  try {
    initAudio(); let now = audioCtx.currentTime;
    let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    if (type === 'fire') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, now); osc.frequency.linearRampToValueAtTime(20, now + 0.3); gain.gain.setValueAtTime(0.3, now); }
    else if (type === 'ice') { osc.type = 'square'; osc.frequency.setValueAtTime(1400, now); gain.gain.setValueAtTime(0.1, now); }
    else if (type === 'holy') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(2000, now + 0.3); gain.gain.setValueAtTime(0.2, now); }
    else { osc.type = 'sine'; osc.frequency.setValueAtTime(400, now); gain.gain.setValueAtTime(0.1, now); }
    gain.gain.linearRampToValueAtTime(0.001, now + 0.3); osc.start(now); osc.stop(now + 0.3);
  } catch(e){}
}

function createDmgPop(dmg, isWeak, isPlayer) {
    const layer = document.getElementById("dmg-layer"); if(!layer) return;
    const pop = document.createElement("div"); pop.style.position = "absolute";
    pop.style.fontSize = isWeak ? "3rem" : "2.2rem"; pop.style.fontWeight = "900";
    if (isPlayer) { pop.style.left = "130px"; pop.style.top = "120px"; pop.style.color = "#ef4444"; pop.innerText = `-${dmg}`; }
    else { pop.style.right = "90px"; pop.style.top = "90px"; pop.style.color = isWeak ? "#facc15" : "#ffffff"; pop.innerText = dmg; }
    let yIdx = 0; let opacity = 1;
    const upTimer = setInterval(() => { yIdx -= 3; pop.style.transform = `translateY(${yIdx}px)`; opacity -= 0.05; pop.style.opacity = opacity; if(opacity <= 0) { clearInterval(upTimer); pop.remove(); } }, 25);
    layer.appendChild(pop);
}

function checkDevPassword() {
    const inputField = document.getElementById("dev-password-input"); if (!inputField) return;
    const badge = document.getElementById("dev-status-badge");
    const debugBtn = document.getElementById("btn-debug-death");
    if (inputField.value === "1192") { badge.innerText = "UNLOCKED"; badge.style.color = '#10b981'; if (document.getElementById("scr-battle").style.display === "block" && debugBtn) debugBtn.style.setProperty('display', 'block', 'important'); }
    else { badge.innerText = "LOCKED"; badge.style.color = '#ef4444'; if (debugBtn) debugBtn.style.setProperty('display', 'none', 'important'); }
}

function hideAll() { ['scr-start','scr-intro','scr-battle','scr-result'].forEach(id => { const el = document.getElementById(id); if (el) el.style.setProperty('display', 'none', 'important'); }); }

function nextStage() {
    playSE('click'); curIdx++;
    if (curIdx >= STAGES.length) { resetGame(); hideAll(); document.getElementById('scr-start').style.setProperty('display', 'block', 'important'); document.getElementById('floor-indicator').style.setProperty('visibility', 'hidden', 'important'); startBGM("title"); return; }
    const data = STAGES[curIdx]; pHp = pMaxHp; hideAll(); stopSlimeAnimation();
    const fInd = document.getElementById('floor-indicator'); if (fInd) { fInd.style.setProperty('visibility', 'visible', 'important'); fInd.innerText = `${data.floor}階`; }
    document.getElementById('scr-intro').style.setProperty('display', 'block', 'important');
    document.getElementById('intro-ch-num').innerText = `FLOOR 0${data.floor}`;
    document.getElementById('intro-ch-title').innerText = data.name;
    document.getElementById('intro-text').innerText = data.txt;
    startBGM("castle");
}

function startBattle() {
  playSE('click'); const data = STAGES[curIdx]; eHp = eMaxHp = data.hp; hideAll(); isBusy = false; isBursting = false;
  const container = document.getElementById('e-sprite-container');
  if(container) {
    container.removeAttribute("style"); container.style.setProperty('animation', 'floatE 2.2s infinite alternate ease-in-out', 'important');
    container.style.setProperty('width', '200px', 'important'); container.style.setProperty('height', '200px', 'important');
    container.style.setProperty('display', 'flex', 'important'); container.style.setProperty('justify-content', 'center', 'important');
    container.style.setProperty('align-items', 'center', 'important'); container.style.setProperty('position', 'relative', 'important');
    container.style.setProperty('filter', `drop-shadow(0 0 25px ${data.eMod})`, 'important');
  }
  const graphicEl = document.getElementById('e-sprite-graphic');
  if(graphicEl) {
    graphicEl.removeAttribute("style"); graphicEl.style.width = "200px"; graphicEl.style.height = "200px"; graphicEl.style.display = "block"; graphicEl.style.imageRendering = "pixelated";
  }
  document.getElementById('scr-battle').style.setProperty('display', 'block', 'important');
  document.getElementById('e-name').innerText = data.name;
  if (data.isCustom) { startSlimeAnimation(); } 
  else if(graphicEl) {
      stopSlimeAnimation();
      graphicEl.style.setProperty('background-image', `url('${MASTER_SHEET_URL}')`, 'important');
      graphicEl.style.setProperty('background-size', '500% 200%', 'important');
      graphicEl.style.setProperty('background-repeat', 'no-repeat', 'important');
      graphicEl.style.setProperty('background-position', `${data.bgX} ${data.bgY}`, 'important');
  }
  updateHpUI(); checkDevPassword();
  let floorMessage = ` <span style='color:#38bdf8;'>[弱点: ${data.weak.toUpperCase()}]</span>`;
  document.getElementById('eff-scr').style.setProperty('border-color', data.floor === 10 ? '#be123c' : '#334155', 'important');
  document.getElementById('battle-log').innerHTML = `術式展開。${data.name}に立ち向かえ。${floorMessage}`;
  startBGM(data.floor === 10 ? "boss" : "horror");
}

function updateHpUI() {
  const scr = document.getElementById('eff-scr'); const alertBadge = document.getElementById('p-hp-alert-badge'); if(!scr) return;
  document.getElementById('p-hp-bar').style.setProperty('width', `${pHp}%`, 'important');
  document.getElementById('e-hp-bar').style.setProperty('width', `${(eHp/eMaxHp*100)}%`, 'important');
  document.getElementById('p-hp-txt').innerText = `HP: ${pHp} / 100`; document.getElementById('e-hp-txt').innerText = `HP: ${eHp} / ${eMaxHp}`;
  if (pHp <= 30) { scr.style.setProperty('animation', 'crisisAlert 1.0s infinite alternate', 'important'); scr.style.setProperty('border-color', '#f43f5e', 'important'); if (alertBadge) alertBadge.style.display = "block"; } 
  else { scr.style.setProperty('animation', 'none', 'important'); scr.style.setProperty('border-color', (STAGES[curIdx] && STAGES[curIdx].floor === 10) ? '#be123c' : '#334155', 'important'); if (alertBadge) alertBadge.style.display = "none"; }
}

// 🔧 ① 修正：行動不能ロックを根本解決した直列完全同期型ターンエンジン
function turn(playerMove) {
  if (isBusy || pHp <= 0 || eHp <= 0) return;
  isBusy = true; 
  
  const data = STAGES[curIdx];
  const enemyMove = Math.random() > 0.4 ? "atk" : "def";
  let pDamage = 0, eDamage = 0; let log = ""; let isCritical = false;
  
  const containerEl = document.getElementById('e-sprite-container');
  const effectLayer = document.getElementById('spell-effect-layer');
  const frontLayer = document.getElementById('front-effect-layer');

  if (playerMove === 'debug_death') {
    playSE('boom'); eDamage = eHp; log = `☠️ 究極消滅術式発動！一撃の元に葬った！`;
    eHp = 0; updateHpUI(); document.getElementById('battle-log').innerHTML = log;
    setTimeout(() => { checkBattleEnd(); }, 400);
    return;
  }

  if (playerMove === 'fire' || playerMove === 'ice' || playerMove === 'holy') {
    if(effectLayer) effectLayer.innerHTML = MISSILE_EFFECTS[playerMove];
    document.getElementById('p-sprite').style.setProperty('transform', 'translateX(55px) scale(1.1) rotate(4deg)', 'important');
    setTimeout(() => { document.getElementById('p-sprite').style.setProperty('transform', 'none', 'important'); }, 400);

    let basePower = 15; let spellName = playerMove === 'fire' ? "ファイア" : (playerMove === 'ice' ? "アイスコフィン" : "ホーリーランス");
    let flashColor = playerMove === 'fire' ? "#e11d48" : (playerMove === 'ice' ? "#0284c7" : "#eab308");

    if (data.weak === playerMove) { isCritical = true; basePower = Math.floor(basePower * 2.3); }
    eDamage = Math.floor(basePower * mana);

    if (enemyMove === 'atk') {
      pDamage = data.atk;
      if(containerEl) containerEl.style.setProperty('animation', 'enemyAssault 0.45s forwards', 'important');
      setTimeout(() => { if(containerEl) containerEl.style.setProperty('animation', 'floatE 2.2s infinite alternate ease-in-out', 'important'); }, 460);
      log = isCritical ? `【CRITICAL】弱点適合！『${spellName}』直撃 【${eDamage}】 ダメージ！突進反撃で ${pDamage} 被弾！` : `『${spellName}』が命中！敵に ${eDamage} ダメージ / あなたは ${pDamage} 被弾！`;
    } else {
      eDamage = Math.floor(eDamage * 0.35); log = `🛡️ 敵の防御！『${spellName}』が減衰。敵に ${eDamage} ダメージ。`;
    }

    // 弾道が飛ぶ360msのラグの後に直列実行
    setTimeout(() => {
      playSE(playerMove); burstSlimeAnimation();
      
      if(containerEl && frontLayer) {
        const parentRect = document.getElementById('eff-scr').getBoundingClientRect();
        const targetRect = containerEl.getBoundingClientRect();
        const relativeX = (targetRect.left - parentRect.left) + targetRect.width / 2;
        const relativeY = (targetRect.top - parentRect.top) + targetRect.height / 2;

        const hitBox = document.createElement('div');
        hitBox.style.position = 'absolute'; hitBox.style.left = `${relativeX}px`; hitBox.style.top = `${relativeY}px`; hitBox.style.pointerEvents = 'none';
        hitBox.innerHTML = HIT_LAND_EFFECTS[playerMove]; frontLayer.appendChild(hitBox);
        setTimeout(() => { hitBox.remove(); if(effectLayer) effectLayer.innerHTML = ""; }, 320);
      }

      triggerEnemyHitPulse(); triggerShake(isCritical ? 'critical_shake' : 'attack_success'); 
      createDmgPop(eDamage, isCritical, false); if (pDamage > 0) createDmgPop(pDamage, false, true);
      if (isCritical) { flashCritical(flashColor); } else { flashScreen(flashColor); }
      
      pHp = Math.max(0, pHp - pDamage); eHp = Math.max(0, eHp - eDamage); updateHpUI();
      document.getElementById('battle-log').innerHTML = log;

      // ➔ 全演出完了後のタイミングで次判定をキック（フリーズ遮断）
      setTimeout(() => { checkBattleEnd(); }, 450);
    }, 360);

    mana = 1.0; document.getElementById('p-aura-layer').style.display = "none";
  }
  else {
    // 防御・チャージ
    if (playerMove === 'def') {
      playSE('def'); if (enemyMove === 'atk') { pDamage = Math.max(1, Math.floor(data.atk * 0.15)); log = `🛡️ シールド展開！突進を 【${pDamage}】 に封殺！`; } else { log = `🔮 シールドを構え警戒。`; }
    } else {
      playSE('chg'); if (enemyMove === 'atk') { pDamage = Math.floor(data.atk * 1.7); log = `🚨 チャージの隙を突かれた！カウンター 【${pDamage}】 被弾！`; mana = 1.0; } else { mana = 2.5; log = `⚡ 魔素充填！次ターン術式威力 【2.5倍】！`; document.getElementById('p-aura-layer').style.display = "block"; }
    }
    flashScreen("#10b981"); if (pDamage > 0) createDmgPop(pDamage, false, true);
    pHp = Math.max(0, pHp - pDamage); updateHpUI(); document.getElementById('battle-log').innerHTML = log;
    setTimeout(() => { checkBattleEnd(); }, 450);
  }
}

function checkBattleEnd() {
  const containerEl = document.getElementById('e-sprite-container');
  if (pHp <= 0 || eHp <= 0) { 
    stopBGM(); stopSlimeAnimation(); 
    if (eHp <= 0) {
      playSE('boom'); triggerShake('critical_shake'); flashCritical('#ffffff'); createExplosionParticles(STAGES[curIdx].weak); 
      if(containerEl) { containerEl.style.setProperty('opacity', '0', 'important'); containerEl.style.setProperty('transform', 'scale(0.05)', 'important'); }
      if (STAGES[curIdx].floor === 10) { setTimeout(() => { playSE('boss_fanfare'); setTimeout(() => { endBattle(); }, 1450); }, 350); } 
      else { setTimeout(() => { endBattle(); }, 650); }
    } else { endBattle(); }
  } else { 
    isBusy = false; // 🔧 生存時は確実にロックを戻し次の行動へ移行！
  }
}

function endBattle() {
  hideAll(); stopSlimeAnimation(); document.getElementById('scr-result').style.setProperty('display', 'block', 'important');
  const rTitle = document.getElementById('res-title'); const rText = document.getElementById('res-text');
  document.getElementById('p-aura-layer').style.display = "none"; document.getElementById('battle-log').innerHTML = "コマンドを選択せよ。";
  if (eHp <= 0) {
    rTitle.innerText = "VICTORY"; rTitle.style.color = '#10b981'; document.getElementById('res-icon').innerText = "🏆";
    if (curIdx === STAGES.length - 1) rText.innerText = "🎉 10階竜王バハムートを完全消滅！世界に光が戻った！";
    else rText.innerText = `激闘の末、${STAGES[curIdx].name}を完全破砕した！`;
  } else {
    rTitle.innerText = "DEFEATED"; rTitle.style.color = '#f43f5e'; document.getElementById('res-icon').innerText = "💀";
    rText.innerText = "大迷宮の闇の前に力尽きた..."; curIdx = -1;
  }
  isBusy = false;
}

function resetGame() { pHp = 100; mana = 1.0; curIdx = -1; isBusy = false; isBursting = false; document.getElementById('battle-log').innerHTML = "コマンドを選択せよ。"; stopBGM(); stopSlimeAnimation(); }
/* ]]> */
</script>
