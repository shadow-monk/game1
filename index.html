<script>
/* <![CDATA[ */
// --- レンガ背景描画ロジック ---
function drawBricks() {
  const canvas = document.getElementById("brick-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const wrapper = document.getElementById("sq-master-wrapper");
  canvas.width = wrapper.offsetWidth || window.innerWidth;
  canvas.height = wrapper.offsetHeight || 1050;
  const brickW = 90; const brickH = 40; 
  const rows = Math.ceil(canvas.height / brickH); const cols = Math.ceil(canvas.width / brickW) + 1;
  ctx.fillStyle = "#111827"; ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (let r = 0; r < rows; r++) {
    const offsetX = (r % 2 === 0) ? 0 : -brickW / 2;
    for (let c = 0; c < cols; c++) {
      const x = c * brickW + offsetX; const y = r * brickH;
      ctx.fillStyle = (r + c) % 3 === 0 ? "#1f2937" : (r + c) % 3 === 1 ? "#111827" : "#374151";
      ctx.fillRect(x, y, brickW - 6, brickH - 6);
      ctx.strokeStyle = "#030712"; ctx.lineWidth = 3; ctx.strokeRect(x, y, brickW - 6, brickH - 6);
    }
  }
}
setTimeout(drawBricks, 100);
window.addEventListener("resize", drawBricks);

function checkDevPassword() {
    const inputVal = document.getElementById("dev-password-input").value;
    const badge = document.getElementById("dev-status-badge");
    const msg = document.getElementById("dev-success-msg");
    const debugBtn = document.getElementById("btn-debug-death");
    if (inputVal === "1192") {
        badge.innerText = "UNLOCKED";
        badge.style.setProperty('color', '#10b981', 'important');
        badge.style.setProperty('background', 'rgba(16,185,129,0.1)', 'important');
        msg.style.display = "block";
        if (document.getElementById("scr-battle").style.display === "block") {
            debugBtn.style.setProperty('display', 'block', 'important');
        }
    } else {
        badge.innerText = "LOCKED";
        badge.style.setProperty('color', '#ef4444', 'important');
        badge.style.setProperty('background', 'rgba(239,68,68,0.1)', 'important');
        msg.style.display = "none";
        debugBtn.style.setProperty('display', 'none', 'important');
    }
}
