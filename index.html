// --- 🧱 自動キャンバスレンガ壁生成プログラム ---
function drawBricks() {
  const canvas = document.getElementById("brick-canvas");
  if (!canvas) return;
  const ctx = canvas.getContext("2d");
  const wrapper = document.getElementById("sq-master-wrapper");
  
  canvas.width = wrapper.offsetWidth || window.innerWidth;
  canvas.height = wrapper.offsetHeight || 1050;
  
  const brickW = 90; 
  const brickH = 40; 
  const rows = Math.ceil(canvas.height / brickH);
  const cols = Math.ceil(canvas.width / brickW) + 1;
  
  ctx.fillStyle = "#111827";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  for (let r = 0; r < rows; r++) {
    const offsetX = (r % 2 === 0) ? 0 : -brickW / 2;
    for (let c = 0; c < cols; c++) {
      const x = c * brickW + offsetX;
      const y = r * brickH;
      
      ctx.fillStyle = (r + c) % 3 === 0 ? "#1f2937" : (r + c) % 3 === 1 ? "#111827" : "#374151";
      ctx.fillRect(x, y, brickW - 6, brickH - 6);
      ctx.strokeStyle = "#030712";
      ctx.lineWidth = 3;
      ctx.strokeRect(x, y, brickW - 6, brickH - 6);
    }
  }
}
setTimeout(drawBricks, 100);
window.addEventListener("resize", drawBricks);

let audioCtx = null;

let isBgmPlaying = false;
let currentBgmType = "title"; 

function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('btn-mute').innerText = isMuted ? "🔇 音声: OFF" : "🔊 音声: ON";
  if (isMuted) { stopBGM(); } else { startBGM(currentBgmType); }
}

const BGM_PATTERNS = {

  battle: [261, 311, 392, 466, 523, 622, 784, 622],

};

function playBgmTick() {
  if (isMuted || !isBgmPlaying || currentBgmType === "title") return; 
  try {
    initAudio();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    
    let pitchMod = (currentBgmType === "battle" && (eHp / eMaxHp <= 0.3)) ? 1.4 : 1.0;
    let notes = BGM_PATTERNS[currentBgmType];
    
    osc.type = (currentBgmType === "boss") ? "sawtooth" : (currentBgmType === "battle" ? "square" : "triangle"); 
    osc.frequency.setValueAtTime(notes[bgmNoteIndex] * pitchMod, audioCtx.currentTime);
    
    let vol = (currentBgmType === "boss") ? 0.04 : 0.03;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    
    osc.start(); osc.stop(audioCtx.currentTime + 0.18);
    bgmNoteIndex = (bgmNoteIndex + 1) % notes.length;
  } catch(e) {}
}

function startBGM(type) {
  currentBgmType = type;
  if (type === "title" || isMuted) { stopBGM(); return; } 
  isBgmPlaying = true;
  
  let speed = 240; 
  if (type === "battle" && (eHp / eMaxHp <= 0.3)) speed = 150; 
  if (type === "boss") speed = 180; 
  if (type === "clear") speed = 150; 
  
  if(bgmInterval) clearInterval(bgmInterval);
  bgmInterval = setInterval(playBgmTick, speed);
}

function stopBGM() {
  isBgmPlaying = false;
  if(bgmInterval) clearInterval(bgmInterval);
}

function playSE(type) {
  if (isMuted) return;
  try {
    initAudio();
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    let now = audioCtx.currentTime;
    
    if (type === 'atk') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(850, now);
      osc.frequency.exponentialRampToValueAtTime(120, now + 0.25);
      gain.gain.setValueAtTime(0.18, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
    } 
    else if (type === 'def') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1400, now);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
      osc.start(now); osc.stop(now + 0.12);
    } 
    else if (type === 'hit') {
      osc.type = 'square';
      osc.frequency.setValueAtTime(75, now);
      osc.frequency.linearRampToValueAtTime(20, now + 0.4);
      gain.gain.setValueAtTime(0.3, now);
      gain.gain.linearRampToValueAtTime(0, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
    }
  } catch(e) {}
}

function triggerShake(shakeType) {
  const stage = document.getElementById('icon-stage');
  let count = 0, max = 12;
  const interval = setInterval(() => {
    if (count >= max) { stage.style.setProperty('transform', 'none', 'important'); clearInterval(interval); return; }
    let x = 0, y = 0;
    if (shakeType === 'attack_success') x = Math.floor(Math.random() * 24) - 12;
    if (shakeType === 'defend_success') y = Math.floor(Math.random() * 12) - 6;
    if (shakeType === 'big_damage') { x = Math.floor(Math.random() * 24) - 12; y = Math.floor(Math.random() * 24) - 12; }
    stage.style.setProperty('transform', `translate3d(${x}px, ${y}px, 0px)`, 'important');
    count++;
  }, 16);
}

function flashScreen(color) {
  const screen = document.getElementById('eff-scr');
  screen.style.setProperty('background-color', color, 'important');
  setTimeout(() => screen.style.setProperty('background-color', '#0f172a', 'important'), 140);
}

function hideAll() { ['scr-start','scr-intro','scr-battle','scr-result'].forEach(id=>document.getElementById(id).style.display='none'); }

function nextStage() {
  curIdx++;
  if (curIdx >= STAGES.length) { curIdx = -1; resetGame(); hideAll(); document.getElementById('scr-start').style.display='block'; document.getElementById('floor-indicator').style.setProperty('visibility', 'hidden', 'important'); startBGM("title"); return; }
  const data = STAGES[curIdx];
  pHp = pMaxHp;
  hideAll();
  
  const fInd = document.getElementById('floor-indicator');
  fInd.style.setProperty('visibility', 'visible', 'important');
  fInd.innerText = data.fl;
  if(data.isBoss || data.isMidBoss) { fInd.style.setProperty('background', '#ffe4e6', 'important'); fInd.style.setProperty('color', '#e11d48', 'important'); }
  else { fInd.style.setProperty('background', '#eeebff', 'important'); fInd.style.setProperty('color', '#4f46e5', 'important'); }

  document.getElementById('scr-intro').style.display = 'block';

  document.getElementById('intro-ch-title').innerText = data.n;
  document.getElementById('intro-text').innerText = data.txt;
  
  if (data.unlock === 'heal') document.getElementById('btn-heal').style.setProperty('visibility', 'visible', 'important');
  if (data.unlock === 'thunder') document.getElementById('btn-thunder').style.setProperty('visibility', 'visible', 'important');
  
  // デスボタンを非戦闘画面では一旦隠す
  document.getElementById('btn-debug-death').style.setProperty('display', 'none', 'important');
  
  stopBGM();
  setTimeout(drawBricks, 50);
}

  }

  else if (data.i === "BASILISK_GREEN_SVG") {

function updateHpUI() {
  document.getElementById('p-hp-bar').style.setProperty('width', `${(pHp/pMaxHp*100)}%`, 'important');
  document.getElementById('e-hp-bar').style.setProperty('width', `${(eHp/eMaxHp*100)}%`, 'important');
  document.getElementById('p-hp-txt').innerText = `HP: ${pHp} / ${pMaxHp}`;
  document.getElementById('e-hp-txt').innerText = `HP: ${eHp} / ${eMaxHp}`;
}

function turn(playerMove) {
  if (isBusy || pHp <= 0 || eHp <= 0) return;
  isBusy = true;
  
  const data = STAGES[curIdx];
  const eMoves = (data.isBoss || data.isMidBoss) ? 
    [{n:"壊滅のバーストブレス", t:"atk"}, {n:"絶対不可侵障壁", t:"def"}, {n:"オメガ詠唱加速", t:"chg"}] :
    [{n:"凶気の猛撃", t:"atk"}, {n:"不浄の結界", t:"def"}, {n:"魔力暴走", t:"chg"}];
    
  let enemyMove = eMoves[Math.floor(Math.random() * eMoves.length)];
  
  let pDamage = 0, eDamage = 0;
  let log = "";
  let shakeType = "attack_success";
  let flashColor = "#e11d48";

  const pSprite = document.getElementById('p-sprite');
  const eSprite = document.getElementById('e-sprite');

  // ☠️ 【新規実装】デバグ用即死コマンド判定
  if (playerMove === 'debug_death') {
    playSE('atk'); setTimeout(() => playSE('hit'), 50);
    pSprite.style.setProperty('transform', 'scale(1.3) rotate(10deg)', 'important');
    setTimeout(() => pSprite.style.setProperty('transform', 'none', 'important'), 160);
    
    eDamage = eHp; // 相手の現在残HP分のダメージ＝即死
    pDamage = 0;   // 自分は無傷
    shakeType = "big_damage"; 
    flashColor = "#a855f7"; // デス専用の紫フラッシュ
    log = `☠️ 禁忌のデバグシステムが起動！【死の呪文デス】が発動した！<br>因果律を歪め、${data.n} を一瞬で即死させた！`;
    mana = 1.0;
  }
  
  else if (playerMove === 'atk') {
    playSE('atk'); setTimeout(() => playSE('hit'), 100);
    pSprite.style.setProperty('transform', 'translateX(60px) scale(1.1)', 'important');
    setTimeout(() => pSprite.style.setProperty('transform', 'none', 'important'), 160);

    if (enemyMove.t === 'atk') {
      eDamage = Math.floor(15 * mana); pDamage = data.atk;
      shakeType = "big_damage"; flashColor = "#7c3aed";
      log = `⚔️ 術式光と破壊の爪牙が正面衝突！アリーナが激しく鳴動する！<br>あなた：${eDamage}ダメ / 敵：${pDamage}ダメ！`;
    } else if (enemyMove.t === 'def') {
      eDamage = Math.floor(4 * mana);
      shakeType = "defend_success"; flashColor = "#475569";
      log = `🛡️ 敵の防壁に魔術が遮断された！「ファイアボール」が相殺された！<br>敵に ${eDamage} ダメージ。`;
    } else if (enemyMove.t === 'chg') {
      eDamage = Math.floor(26 * mana);
      shakeType = "attack_success"; flashColor = "#e11d48";
      log = `🔥 力を集束させている敵の無防備な死角へ、ファイアボールが直撃！<br>敵に 【${eDamage}】 の致命傷！`;
    }
    mana = 1.0;
  } 
  
  else if (playerMove === 'def') {
    if (enemyMove.t === 'atk') {
      playSE('def');
      pDamage = (data.isBoss || data.isMidBoss) ? 6 : 2; 
      shakeType = "defend_success"; flashColor = "#10b981";
      log = `🛡️ 魔導「シールド」を展開！敵の苛烈な猛攻を完全にいなした！<br>ダメージをわずか 【${pDamage}】 に抑え込んだ！`;
      eSprite.style.setProperty('transform', 'translateX(-40px)', 'important');
      setTimeout(() => eSprite.style.setProperty('transform', 'none', 'important'), 160);
    } else {
      playSE('def');
      shakeType = "defend_success"; flashColor = "#0f172a";
      log = `🔮 シールドを張って身を護る。敵は邪悪な魔力を不気味に練り上げている…`;
    }
  } 
  
  else if (playerMove === 'chg') {
    playSE('def');
    if (enemyMove.t === 'atk') {
      setTimeout(() => playSE('hit'), 120);
      pDamage = Math.floor(data.atk * 1.8);
      shakeType = "big_damage"; flashColor = "#b91c1c";
      log = `🚨 「魔力チャージ」の無防備な瞬間を狙われ、手痛いカウンターを被弾！<br>脳髄を揺さぶられ、 【${pDamage}】 の大ダメージ！`;
      eSprite.style.setProperty('transform', 'translateX(-60px) scale(1.1)', 'important');
      setTimeout(() => eSprite.style.setProperty('transform', 'none', 'important'), 160);
    } else {
      mana = 2.5; shakeType = "defend_success"; flashColor = "#4f46e5";
      log = `✨ 周囲の魔素を限界まで体内に吸引！大魔導回路が臨界点を突破！<br>次ターンの火力が 【2.5倍】 に跳ね上がる！`;
    }
  } 
  
  else if (playerMove === 'heal') {
    playSE('def'); flashScreen('#db2777'); shakeType = "defend_success";
    pHp = Math.min(pMaxHp, pHp + 35);
    log = `💖 聖なる「ヒーリング」の光！傷が急速に塞がりHPが 【35】 回復した！`;
  } 
  
  else if (playerMove === 'thunder') {
    playSE('atk'); flashScreen('#fbbf24'); shakeType = "attack_success";
    eDamage = 22;
    log = `🌩️ 天を割る「サンダーボルト」が炸裂！敵の装甲を貫通し 【22】 ダメージ！`;
  }

  triggerShake(shakeType);
  flashScreen(flashColor);

  pHp = Math.max(0, pHp - pDamage);
  eHp = Math.max(0, eHp - eDamage);
  updateHpUI();
  document.getElementById('battle-log').innerHTML = log;
  document.getElementById('charge-badge').style.display = (mana > 1.0 ? 'block' : 'none');

  if (eHp > 0 && (eHp / eMaxHp <= 0.3) && isBgmPlaying && currentBgmType === "battle") {
    startBGM("battle"); 
  }

  setTimeout(() => {
    if (pHp <= 0 || eHp <= 0) {
      stopBGM();
      endBattle();
    } else {
      isBusy = false;
    }
  }, 400);
}

function endBattle() {
  hideAll();
  document.getElementById('scr-result').style.display = 'block';
  const rTitle = document.getElementById('res-title');
  const rText = document.getElementById('res-text');
  const rBtn = document.getElementById('res-btn');
  
  // バトル終了時はデバッグ即死ボタンを隠す
  document.getElementById('btn-debug-death').style.setProperty('display', 'none', 'important');
  
  if (eHp <= 0) {
    startBGM("clear");
    rTitle.innerText = "VICTORY"; rTitle.style.setProperty('color', '#10b981', 'important');
    document.getElementById('res-icon').innerText = "🏆";
    
    if (STAGES[curIdx].isBoss) {
      rText.innerText = "🎉 ついに螺旋の最上階にて終末の暗黒竜バハムートを完全討伐！\n\n世界に奪われていた全ての魔導光が解き放たれ、大地に永遠の平和が戻った！\n\nあなたは歴史に名を刻む究極の魔導王となったのだ！";
      rBtn.innerText = "タイトル画面（最初から）へ";
    } else {
      rText.innerText = `激闘の末、${STAGES[curIdx].n}の討伐に成功した！\n\n魔導魂が昇華され、さらに過酷な上の階層への階段が姿を現した！`;
      rBtn.innerText = "上の階層へ登る";
    }
  } else {
    playSE('hit');
    rTitle.innerText = "DEFEATED"; rTitle.style.setProperty('color', '#f43f5e', 'important');
    document.getElementById('res-icon').innerText = "💀";
    rText.innerText = "圧倒的な深淵の闇の前に、あなたの命の灯火が消え去った…\n\n螺旋の塔は静まり返り、世界は永遠の闇へと閉ざされる…";
    rBtn.innerText = "タイトル画面へ戻る";
    curIdx = -1;
  }
  isBusy = false;
  setTimeout(drawBricks, 50);
}

function resetGame() {
  pMaxHp = 100; pHp = 100; mana = 1.0; curIdx = -1;
  document.getElementById('btn-heal').style.setProperty('visibility', 'hidden', 'important');
  document.getElementById('btn-thunder').style.setProperty('visibility', 'hidden', 'important');
  document.getElementById('btn-debug-death').style.setProperty('display', 'none', 'important');
  stopBGM();
}

setTimeout(() => { startBGM("title"); drawBricks(); }, 500);
