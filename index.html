<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>スパイラルタワー</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0f172a; overflow: hidden; color: #fff; font-family: sans-serif; }
        #canvas-bricks { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #game-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; position: relative; }
        #floor-tag { position: absolute; top: 10px; left: 10px; background: #eeebff; color: #4f46e5; padding: 5px 15px; border-radius: 99px; font-weight: bold; }
        #game-board { background: #fff; border: 6px solid #4f46e5; border-radius: 30px; width: 640px; padding: 25px 15px; text-align:center; box-shadow:0 40px 80px rgba(0,0,0,0.6); position: relative;}
        #screen-start, #screen-intro, #screen-battle, #screen-result { display: none; }
        .visible { display: block !important; }
        h1 { color: #0f172a; font-size: 3rem; margin: 0 0 20px 0; }
        .desc-box { background: #f8fafc; border-radius: 20px; padding: 20px; text-align: left; margin-bottom: 20px; color: #1e293b; border-left: 10px solid #4f46e5; }
        .btn { background: #4f46e5; color: white; border: none; border-radius: 16px; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #6366f1; }
        #monster-sprite { width: 200px; height: 200px; image-rendering: pixelated; margin-top: 20px;}
        #log { margin-top: 20px; padding: 10px; background: #e2e8f0; border-radius: 8px; color: #334155; min-height: 1.2em; text-align: left;}
        #floor-info { font-size: 2rem; color: #4f46e5; font-weight: bold; margin-bottom: 10px;}
        #result-msg { color: #1e293b; font-size: 1.5rem; margin-top: 20px;}
    </style>
</head>
<body>
    <canvas id="canvas-bricks"></canvas>
    <div id="game-wrapper">
        <div id="floor-tag">1階</div>
        <div id="game-board">
            <div id="screen-start" class="visible">
                <div style="font-size: 1.1rem; color: #4f46e5; letter-spacing: 0.3em;">LEGENDARY RPG</div>
                <h1>スパイラルタワー</h1>
                <div style="height:5px; background:linear-gradient(90deg,#4f46e5,#f43f5e); width:150px; margin:0 auto 20px auto; border-radius:99px;"></div>
                <div class="desc-box">
                    <p style="font-size: 1.15rem; font-weight: bold; margin: 0;">各階層のモンスターと戦いながら、塔の最上階を目指す。モンスターは各階層の最後に出現する。</p>
                </div>
                <button class="btn" onclick="startGame()">迷宮へ侵入する</button>
            </div>

            <div id="screen-intro">
                <div id="intro-floor" style="color: #f43f5e; font-size: 1.3rem; font-weight: bold; margin-bottom: 10px;">FLOOR 01</div>
                <h2 id="intro-name" style="color: #0f172a; font-size: 2.5rem; font-weight: bold; margin: 0 0 20px 0;">スライム</h2>
                <div class="desc-box">
                    <p id="intro-desc" style="font-size: 1.1rem; margin: 0;">通路を塞ぐ、軟体の魔物。</p>
                </div>
                <button class="btn" onclick="startBattle()">戦いを開始する</button>
            </div>

            <div id="screen-battle">
                <div id="floor-info">3階：スケルトンナイト</div>
                <img id="monster-sprite" src="https://raw.githubusercontent.com/shadow-monk/game1/main/assets/monster2/skeleton/skeleton%20(1).png" alt="Skeleton">
                <div id="log"></div>
            </div>

            <div id="screen-result">
                <div id="result-icon" style="font-size: 80px;">🏆</div>
                <h1 id="result-status">VICTORY</h1>
                <div class="desc-box">
                    <p id="result-msg">強敵を撃破した！</p>
                </div>
                <button id="result-btn" class="btn" onclick="nextFloor()">次へ進む</button>
            </div>
        </div>
    </div>

    <script>
        const canvasBricks = document.getElementById('canvas-bricks');
        const ctxBricks = canvasBricks.getContext('2d');
        function drawBricks() {
            canvasBricks.width = window.innerWidth;
            canvasBricks.height = window.innerHeight;
            ctxBricks.fillStyle = '#0f172a'; ctxBricks.fillRect(0, 0, canvasBricks.width, canvasBricks.height);
            ctxBricks.strokeStyle = 'rgba(51,65,85,0.2)'; ctxBricks.lineWidth = 1;
            for (let y = 0; y < canvasBricks.height; y += 40) {
                ctxBricks.beginPath(); ctxBricks.moveTo(0, y); ctxBricks.lineTo(canvasBricks.width, y); ctxBricks.stroke();
                const offset = (Math.floor(y / 40) % 2) * 50;
                for (let x = offset; x < canvasBricks.width; x += 100) {
                    ctxBricks.beginPath(); ctxBricks.moveTo(x, y); ctxBricks.lineTo(x, y + 40); ctxBricks.stroke();
                }
            }
        }
        window.addEventListener('resize', drawBricks); drawBricks();

        const floors = [
            {floor: 1, name: 'スライム', desc: '通路を塞ぐ、軟体の魔物。', imageCount: 1, baseName: 'slime', sprite: 'https://raw.githubusercontent.com/shadow-monk/game1/main/assets/monster1/slime/slime.gif'},
            {floor: 2, name: 'ゴブリン', desc: '集団で襲い掛かる、小柄な魔物。', imageCount: 1, baseName: 'goblin', sprite: 'https://raw.githubusercontent.com/shadow-monk/game1/main/assets/monster1/goblin/goblin.gif'},
            {floor: 3, name: 'スケルトンナイト', desc: 'かつての王国の騎士がアンデッド化した姿。', imageCount: 9, baseName: 'skeleton'},
        ];

        let currentFloorIndex = -1;

        function showScreen(screenId) {
            document.querySelectorAll('#game-board > div').forEach(s => s.classList.remove('visible'));
            document.getElementById(screenId).classList.add('visible');
        }

        function startGame() { showFloorIntro(0); }

        function showFloorIntro(index) {
            currentFloorIndex = index;
            const floor = floors[currentFloorIndex];
            document.getElementById('intro-floor').innerText = `FLOOR ${String(floor.floor).padStart(2, '0')}`;
            document.getElementById('intro-name').innerText = floor.name;
            document.getElementById('intro-desc').innerText = floor.desc;
            document.getElementById('floor-tag').innerText = `${floor.floor}階`;
            showScreen('screen-intro');
        }

        function startBattle() {
            const floor = floors[currentFloorIndex];
            document.getElementById('floor-info').innerText = `${floor.floor}階：${floor.name}`;
            const monsterSprite = document.getElementById('monster-sprite');
            if (floor.floor === 3) {
                let imgIndex = 1;
                monsterSprite.src = `https://raw.githubusercontent.com/shadow-monk/game1/main/assets/monster2/skeleton/skeleton%20(${imgIndex}).png`;
                setInterval(() => {
                    imgIndex = (imgIndex % floor.imageCount) + 1;
                    monsterSprite.src = `https://raw.githubusercontent.com/shadow-monk/game1/main/assets/monster2/skeleton/skeleton%20(${imgIndex}).png`;
                }, 100);
            } else { monsterSprite.src = floor.sprite; }
            document.getElementById('log').innerText = '';
            showScreen('screen-battle');
            setTimeout(() => { showResult('VICTORY'); }, 3000);
        }

        function showResult(status) {
            const floor = floors[currentFloorIndex];
            if (status === 'VICTORY') {
                document.getElementById('result-icon').innerText = '🏆';
                document.getElementById('result-status').innerText = 'VICTORY';
                document.getElementById('result-msg').innerText = `${floor.name}を倒した！`;
                if (currentFloorIndex < floors.length - 1) { document.getElementById('result-btn').innerText = '次へ進む'; }
                else { document.getElementById('result-btn').innerText = '全階層制覇！'; document.getElementById('result-btn').onclick = restartGame;}
            } else {
                document.getElementById('result-icon').innerText = '💀';
                document.getElementById('result-status').innerText = 'GAME OVER';
                document.getElementById('result-msg').innerText = '敗北してしまった。';
                document.getElementById('result-btn').innerText = '最初からやり直す';
                document.getElementById('result-btn').onclick = restartGame;
            }
            showScreen('screen-result');
        }

        function nextFloor() { showFloorIntro(currentFloorIndex + 1); }
        function restartGame() { showFloorIntro(0); }
    </script>
</body>
</html>
